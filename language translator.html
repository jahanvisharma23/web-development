<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentence Translator</title>
    <style>*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:700px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:130px;
    resize:none;
    padding:15px;
    font-size:16px;
    border:2px solid #ddd;
    border-radius:10px;
    margin-bottom:20px;
}

.languages{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-bottom:20px;
}

select{
    padding:10px;
    font-size:16px;
    border-radius:8px;
}

button{
    width:100%;
    padding:14px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:17px;
    transition:.3s;
}

button:hover{
    background:#0056b3;
}

#copyBtn{
    margin-top:15px;
    background:#28a745;
}

#copyBtn:hover{
    background:#1e7e34;
}

.loader{
    width:40px;
    height:40px;
    border:5px solid #ddd;
    border-top:5px solid #007BFF;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin:20px auto;
    display:none;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

@media(max-width:750px){

.container{
width:95%;
}

.languages{
flex-direction:column;
}

}</style>
</head>
<body>

<div class="container">

    <h1>🌍 Sentence Translator</h1>

    <textarea
        id="inputText"
        placeholder="Enter text here..."
    ></textarea>

    <div class="languages">

        <select id="fromLang">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
        </select>

        <span>➡️</span>

        <select id="toLang">
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
        </select>

    </div>

    <button id="translateBtn">
        Translate
    </button>

    <div class="loader" id="loader"></div>

    <textarea
        id="outputText"
        placeholder="Translation..."
        readonly
    ></textarea>

    <button id="copyBtn">
        Copy Translation
    </button>

</div>

<script>const input = document.getElementById("inputText");
const output = document.getElementById("outputText");

const fromLang = document.getElementById("fromLang");
const toLang = document.getElementById("toLang");

const btn = document.getElementById("translateBtn");
const loader = document.getElementById("loader");

const copyBtn = document.getElementById("copyBtn");

btn.addEventListener("click", translateText);

async function translateText(){

    const text = input.value.trim();

    if(text===""){
        alert("Please enter some text.");
        return;
    }

    loader.style.display="block";
    output.value="";

    const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${fromLang.value}|${toLang.value}`;

    try{

        const response=await fetch(url);

        const data=await response.json();

        output.value=data.responseData.translatedText;

    }
    catch(error){

        output.value="Translation Failed.";

    }

    loader.style.display="none";

}

copyBtn.addEventListener("click",()=>{

    if(output.value==="") return;

    navigator.clipboard.writeText(output.value);

    copyBtn.innerText="Copied ✔";

    setTimeout(()=>{
        copyBtn.innerText="Copy Translation";
    },2000);

});</script>

</body>
</html>
