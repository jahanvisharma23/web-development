<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple ATM Machine</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.atm{
    background:white;
    padding:30px;
    width:320px;
    text-align:center;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h1{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    background:#007bff;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#message{
    margin-top:15px;
    color:red;
    font-weight:bold;
}
    </style>
</head>
<body>

<div class="atm">
    <h1>ATM Machine</h1>

    <input type="password" id="pin" placeholder="Enter PIN">

    <button onclick="login()">Login</button>

    <div id="menu" style="display:none;">

        <h2 id="balance">Balance: ₹5000</h2>

        <input type="number" id="amount" placeholder="Enter Amount">

        <button onclick="deposit()">Deposit</button>

        <button onclick="withdraw()">Withdraw</button>

    </div>

    <p id="message"></p>

</div>

<script>
    let balance = 5000;

function login(){

    let pin = document.getElementById("pin").value;

    if(pin === "1234"){
        document.getElementById("menu").style.display = "block";
        document.getElementById("message").innerHTML = "Login Successful";
        document.getElementById("message").style.color = "green";
    }else{
        document.getElementById("message").innerHTML = "Wrong PIN";
        document.getElementById("message").style.color = "red";
    }

}

function deposit(){

    let amount = Number(document.getElementById("amount").value);

    if(amount > 0){
        balance += amount;
        updateBalance();
    }

}

function withdraw(){

    let amount = Number(document.getElementById("amount").value);

    if(amount > balance){
        document.getElementById("message").innerHTML = "Insufficient Balance";
        document.getElementById("message").style.color = "red";
    }else if(amount > 0){
        balance -= amount;
        updateBalance();
    }

}

function updateBalance(){

    document.getElementById("balance").innerHTML = "Balance: ₹" + balance;
    document.getElementById("amount").value = "";
    document.getElementById("message").innerHTML = "Transaction Successful";
    document.getElementById("message").style.color = "green";

}
</script>

</body>
</html>
