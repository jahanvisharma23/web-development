<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#4e73df;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#fff;
    padding:30px;
    width:380px;
    border-radius:10px;
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.box{
    display:flex;
    flex-direction:column;
    margin-bottom:18px;
}

label{
    margin-bottom:6px;
    font-weight:bold;
}

input,select{
    padding:10px;
    font-size:16px;
}

.row{
    display:flex;
    gap:15px;
}

.row .box{
    flex:1;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#4e73df;
    color:white;
    font-size:18px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#355ac9;
}

#result{
    margin-top:20px;
    text-align:center;
    color:#333;
}
        </style>
</head>
<body>

<div class="container">
    <h1>Currency Converter</h1>

    <div class="box">
        <label>Amount</label>
        <input type="number" id="amount" placeholder="Enter amount" value="1">
    </div>

    <div class="row">
        <div class="box">
            <label>From</label>
            <select id="from">
                <option value="USD">USD</option>
                <option value="INR">INR</option>
                <option value="EUR">EUR</option>
                <option value="GBP">GBP</option>
                <option value="JPY">JPY</option>
                <option value="AUD">AUD</option>
                <option value="CAD">CAD</option>
            </select>
        </div>

        <div class="box">
            <label>To</label>
            <select id="to">
                <option value="INR">INR</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="GBP">GBP</option>
                <option value="JPY">JPY</option>
                <option value="AUD">AUD</option>
                <option value="CAD">CAD</option>
            </select>
        </div>
    </div>

    <button onclick="convertCurrency()">Convert</button>

    <h2 id="result">Converted Amount: --</h2>
</div>

<script>
    async function convertCurrency(){

    const amount = document.getElementById("amount").value;
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;
    const result = document.getElementById("result");

    if(amount <= 0){
        alert("Please enter a valid amount.");
        return;
    }

    try{

        const response = await fetch(`https://open.er-api.com/v6/latest/${from}`);
        const data = await response.json();

        const rate = data.rates[to];
        const converted = (amount * rate).toFixed(2);

        result.innerHTML = `
        ${amount} ${from} = <br>
        <strong>${converted} ${to}</strong>
        `;

    }
    catch(error){
        result.innerHTML = "Unable to fetch exchange rates.";
    }

}
</script>

</body>
</html>
