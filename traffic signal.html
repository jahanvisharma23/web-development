<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Signal Simulation</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#87CEEB;
    font-family:Arial,Helvetica,sans-serif;
    text-align:center;
    overflow:hidden;
}

h1{
    margin-top:20px;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:20px;
}

.signal{
    width:130px;
    background:#222;
    padding:15px;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
    z-index:2;
}

.light{
    width:80px;
    height:80px;
    border-radius:50%;
    background:#444;
    margin:auto;
    transition:.3s;
}

.red.active{
    background:red;
    box-shadow:0 0 30px red;
}

.yellow.active{
    background:yellow;
    box-shadow:0 0 30px yellow;
}

.green.active{
    background:lime;
    box-shadow:0 0 30px lime;
}

.pole{
    width:18px;
    height:220px;
    background:#555;
}

.timer{
    margin-top:20px;
    font-size:28px;
    font-weight:bold;
}

.buttons{
    margin-top:20px;
}

button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
    background:#333;
    color:white;
}

button:hover{
    background:#000;
}

.road{
    position:absolute;
    bottom:0;
    width:100%;
    height:120px;
    background:#444;
}

.road::before{
    content:"";
    position:absolute;
    width:100%;
    height:8px;
    background:repeating-linear-gradient(
        to right,
        white 0 40px,
        transparent 40px 80px
    );
    top:55px;
}
    </style>
</head>
<body>

<h1>Traffic Signal Simulation</h1>

<div class="container">

    <div class="pole"></div>

    <div class="signal">
        <div class="light red"></div>
        <div class="light yellow"></div>
        <div class="light green"></div>
    </div>

</div>

<div class="timer">
    Time Left:
    <span id="count">3</span>s
</div>

<div class="buttons">
    <button onclick="startSignal()">▶ Start</button>
    <button onclick="stopSignal()">⏸ Stop</button>
    <button onclick="resetSignal()">🔄 Reset</button>
</div>

<div class="road"></div>

<script>
  const red = document.querySelector(".red");
const yellow = document.querySelector(".yellow");
const green = document.querySelector(".green");
const timer = document.getElementById("count");

const sequence = [
    { light: red, duration: 3 },
    { light: yellow, duration: 1 },
    { light: green, duration: 3 },
    { light: yellow, duration: 1 }
];

let current = 0;
let timeLeft = sequence[current].duration;

function clearLights() {
    red.classList.remove("active");
    yellow.classList.remove("active");
    green.classList.remove("active");
}

function updateSignal() {
    clearLights();
    sequence[current].light.classList.add("active");
    timer.textContent = timeLeft;
}

updateSignal();

setInterval(() => {
    timeLeft--;
    timer.textContent = timeLeft;

    if (timeLeft <= 0) {
        current = (current + 1) % sequence.length;
        timeLeft = sequence[current].duration;
        updateSignal();
    }
}, 1000);
</script>

</body>
</html>
