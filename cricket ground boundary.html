<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Ground</title>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    background:#1e1e1e;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
}

h1{
    color:white;
    margin-bottom:20px;
}

#ground{
    width:600px;
    height:600px;
    position:relative;
    border-radius:50%;
    border:4px solid white;

    background:
    repeating-linear-gradient(
        90deg,
        #3cb043 0px,
        #3cb043 40px,
        #2f9f34 40px,
        #2f9f34 80px
    );

    overflow:hidden;
}

.pitch{
    width:70px;
    height:220px;
    background:#d8b48c;
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    border:2px solid white;
}

.player{
    width:18px;
    height:18px;
    border-radius:50%;
    background:white;
    position:absolute;
    transform:translate(-50%,-50%);
}
</style>
</head>
<body>

<h1>🏏 Cricket Ground</h1>

<div id="ground">
    <div class="pitch"></div>
</div>

<script>
    const ground = document.getElementById("ground");

// Radius of field
const radius = 250;

// Center
const centerX = 300;
const centerY = 300;

// Create 12 fielders around boundary
for(let i=0;i<12;i++){

    const angle = (360/12)*i;

    const rad = angle*Math.PI/180;

    const x = centerX + radius*Math.cos(rad);

    const y = centerY + radius*Math.sin(rad);

    const player = document.createElement("div");

    player.className = "player";

    player.style.left = x+"px";

    player.style.top = y+"px";

    ground.appendChild(player);

}

// Batsman
createPlayer(centerX,260,"blue");

// Bowler
createPlayer(centerX,420,"red");

// Umpire
createPlayer(centerX+35,350,"black");

function createPlayer(x,y,color){

    const p=document.createElement("div");

    p.className="player";

    p.style.left=x+"px";

    p.style.top=y+"px";

    p.style.background=color;

    ground.appendChild(p);

}
</script>

</body>
</html>
